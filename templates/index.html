<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Category Classifier</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h1>📰 News Category Classifier</h1>

    <p class="subtitle">
        Enter a news headline or article snippet and classify it.
    </p>

    <form action="/predict" method="POST">

        <textarea
            name="news"
            placeholder="Type news text here..."
            required>{{ text if text else '' }}</textarea>

        <button type="submit">
            Classify
        </button>

    </form>

    {% if prediction %}

    <div class="result">

        <h2>Prediction</h2>

        <span class="badge">
            {{ prediction }}
        </span>

    </div>

    {% endif %}

</div>

</body>
</html>
